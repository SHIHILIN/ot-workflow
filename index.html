<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OT Workflow | 思誼職能治療師</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d2137;
      color: #e8f0f8;
      line-height: 1.6;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(26, 79, 138, 0.4) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(13, 43, 65, 0.6) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
    
    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
    }
    
    .profile-card { padding: 28px 24px; margin-bottom: 24px; text-align: center; }
    .profile-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(100, 160, 220, 0.5);
      box-shadow: 0 0 20px rgba(26, 79, 138, 0.4);
      display: block;
      margin: 0 auto;
    }
    .profile-name { font-size: 20px; font-weight: 600; color: #e8f0f8; margin-bottom: 4px; }
    .profile-motto {
      background: rgba(0, 0, 0, 0.3);
      border-left: 3px solid #4a9eda;
      padding: 10px 14px;
      margin: 12px 0;
      font-size: 13px;
      color: #b8d4f0;
      border-radius: 6px;
      line-height: 1.6;
    }
    .profile-bio {
      font-size: 13px;
      color: #8ab4d4;
      line-height: 1.6;
      margin-top: 12px;
    }
    
    .content-section { padding: 28px; margin-bottom: 24px; }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #e8f0f8;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      padding: 7px 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #8ab4d4;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .tab-btn:hover { border-color: rgba(74, 158, 218, 0.5); background: rgba(74, 158, 218, 0.1); color: #c8e0f4; }
    .tab-btn.active { background: rgba(26, 79, 138, 0.6); color: white; border-color: rgba(74, 158, 218, 0.6); }
    
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .card {
      border-radius: 12px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.3s;
      cursor: pointer;
    }
    .card:hover {
      border-color: rgba(74, 158, 218, 0.4);
      background: rgba(255, 255, 255, 0.09);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    .card[data-theme="book"] { border-left: 3px solid #6c9ebf; }
    .card[data-theme="tool"] { border-left: 3px solid #52b788; }
    .card[data-theme="technique"] { border-left: 3px solid #f4a261; }
    .card[data-theme="question"] { border-left: 3px solid #9b72cf; }
    .card[data-theme="shopping"] { border-left: 3px solid #e07a98; }
    .card[data-theme="course"] { border-left: 3px solid #4a9eda; }
    
    .card-title { font-size: 15px; font-weight: 600; color: #e8f0f8; margin-bottom: 6px; }
    .card-desc { font-size: 12px; color: #8ab4d4; margin-bottom: 10px; line-height: 1.5; }
    
    .card-links { display: flex; flex-direction: column; gap: 6px; }
    .card-link {
      font-size: 11px;
      padding: 6px 10px;
      background: rgba(74, 158, 218, 0.2);
      border: 1px solid rgba(74, 158, 218, 0.3);
      border-radius: 4px;
      color: #4a9eda;
      text-decoration: none;
      transition: all 0.2s;
      text-align: center;
    }
    .card-link:hover { background: rgba(74, 158, 218, 0.4); border-color: rgba(74, 158, 218, 0.6); }
    
    .contact-section {
      padding: 20px 24px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .contact-link {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s;
      color: #8ab4d4;
    }
    .contact-link:hover {
      background: rgba(74, 158, 218, 0.2);
      border-color: rgba(74, 158, 218, 0.4);
      color: #c8e0f4;
    }
    .contact-icon { font-size: 20px; margin-bottom: 6px; }
    .contact-label { font-size: 11px; display: block; color: #8ab4d4; }
    .contact-val { font-size: 10px; display: block; color: #6a8cb4; margin-top: 2px; }
    
    .btn {
      padding: 10px 16px;
      background: rgba(74, 158, 218, 0.3);
      border: 1px solid rgba(74, 158, 218, 0.5);
      border-radius: 6px;
      color: #e8f0f8;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(74, 158, 218, 0.5); }
    
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: #0d2137;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; margin-bottom: 4px; color: #8ab4d4; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 8px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      color: #e8f0f8;
      font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .btn-group { display: flex; gap: 8px; margin-top: 16px; }
    .btn-group button { flex: 1; }
    
    .admin-section { margin-bottom: 20px; }
    .admin-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #e8f0f8; }
    .admin-lock-form {
      text-align: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 20px;
    }
    #adminPwInput {
      padding: 8px 12px;
      width: 200px;
      margin-right: 8px;
    }
    .admin-error { font-size: 11px; color: #f08080; margin-top: 8px; }
    .admin-links { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 個人資料卡片 -->
    <div class="profile-card glass">
      <img id="profileAvatar" class="profile-avatar" src="https://i.postimg.cc/FsPZ0yP1/R0010032.jpg" alt="Avatar">
      <div class="profile-name">思誼職能治療師</div>
      <div class="profile-motto">𓅮 你也是個多元文化ㄉ漂亮寶貝◔.̮◔✧✦</div>
      <div class="profile-bio">大家都問我問題，所以我架了一個網站🚄</div>
    </div>

    <!-- 思誼的寶箱 -->
    <div class="content-section glass">
      <div class="section-title">思誼的寶箱</div>
      <div class="tabs" id="tabsContainer"></div>
      <div class="cards-grid" id="cardsContainer"></div>
    </div>

    <!-- 聯絡方式 -->
    <div class="glass contact-section" id="contactSection">
      <a href="mailto:ot.workflow.shihi@gmail.com" class="contact-link">
        <div class="contact-icon">📧</div>
        <div class="contact-label">信箱</div>
        <div class="contact-val">ot.workflow.shihi@gmail.com</div>
      </a>
      <a href="https://www.instagram.com/ot.workflow" target="_blank" class="contact-link">
        <div class="contact-icon">📱</div>
        <div class="contact-label">Instagram</div>
        <div class="contact-val">@ot.workflow</div>
      </a>
      <a href="https://www.facebook.com/ot.workflow" target="_blank" class="contact-link">
        <div class="contact-icon">📘</div>
        <div class="contact-label">Facebook</div>
        <div class="contact-val">ot.workflow</div>
      </a>
    </div>

    <!-- 後台管理（密碼保護） -->
    <div id="adminSection" style="display: none;">
      <div class="glass" style="padding: 28px; margin-bottom: 24px;">
        <div class="admin-title">🔧 後台管理</div>
        
        <!-- 資料備份 -->
        <div class="admin-section">
          <div style="font-size: 12px; font-weight: 600; color: #8ab4d4; margin-bottom: 10px;">💾 資料備份</div>
          <div class="admin-links">
            <button class="btn" id="exportBtn">📤 匯出 JSON</button>
            <label class="btn" style="cursor: pointer; margin: 0;">
              📥 匯入 JSON
              <input type="file" id="importInput" accept=".json" style="display: none;">
            </label>
          </div>
          <div style="font-size: 10px; color: rgba(138, 180, 212, 0.5); margin-top: 8px;">匯出後存好 JSON 檔，下次匯入即可還原所有卡片與大頭照</div>
        </div>

        <!-- 新增卡片 -->
        <div class="admin-section">
          <button class="btn" id="addBtn" style="width: 100%;">➕ 新增卡片</button>
        </div>
      </div>
    </div>

    <!-- 密碼鎖 -->
    <div id="adminLock">
      <div class="glass admin-lock-form">
        <div style="font-size: 12px; color: #8ab4d4; margin-bottom: 10px;">🔒 後台管理</div>
        <input type="password" id="adminPwInput" placeholder="請輸入密碼">
        <button class="btn" id="adminUnlockBtn">進入</button>
        <div id="adminPwError" class="admin-error" style="display: none;">密碼錯誤</div>
      </div>
    </div>
  </div>

  <!-- 新增/編輯卡片模態 -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">新增卡片</div>
      <form id="editForm">
        <div class="form-group">
          <label>分類</label>
          <select id="editTheme">
            <option value="shopping">🛍️ 團購</option>
            <option value="book">📚 書籍推薦</option>
            <option value="technique">👶 技巧分享</option>
            <option value="question">❓ 常見問題</option>
            <option value="course">🎓 找我上課</option>
          </select>
        </div>
        <div class="form-group">
          <label>標題</label>
          <input type="text" id="editTitle" required>
        </div>
        <div class="form-group">
          <label>描述</label>
          <textarea id="editDesc" required></textarea>
        </div>
        <div class="form-group">
          <label>連結（換行分隔，格式：標籤 | URL）</label>
          <textarea id="editLinks" placeholder="(IG)影片介紹 | https://...&#10;蝦皮分潤連結 | https://..."></textarea>
        </div>
        <div class="btn-group">
          <button type="button" class="btn" id="saveBtnModal">保存</button>
          <button type="button" class="btn" id="deleteBtnModal" style="display: none;">刪除</button>
          <button type="button" class="btn" onclick="document.getElementById('editModal').classList.remove('open')">取消</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = 'P3izFr&BrdZr2';
    
    let cardsData = [];
    let tabOrder = [
      { key: 'all', label: '📋 全部' },
      { key: 'shopping', label: '🛍️ 團購' },
      { key: 'book', label: '📚 書籍推薦' },
      { key: 'technique', label: '👶 技巧分享' },
      { key: 'question', label: '❓ 常見問題' },
      { key: 'course', label: '🎓 找我上課' }
    ];
    let currentTab = 'all';
    let editingId = null;
    let isAdminUnlocked = false;

    // 初始化 - 從 index.json 載入數據
    async function loadData() {
      try {
        const response = await fetch('index.json');
        const data = await response.json();
        cardsData = data.cardsData || [];
        if (data.tabOrder) tabOrder = data.tabOrder;
        if (data.avatar) document.getElementById('profileAvatar').src = data.avatar;
        renderTabs();
        renderCards();
      } catch (err) {
        console.log('未找到index.json，使用預設數據');
        renderTabs();
        renderCards();
      }
    }

    function renderTabs() {
      const container = document.getElementById('tabsContainer');
      container.innerHTML = '';
      tabOrder.forEach(tab => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        if (tab.key === currentTab) btn.classList.add('active');
        btn.textContent = tab.label;
        btn.onclick = (e) => { e.preventDefault(); currentTab = tab.key; renderTabs(); renderCards(); };
        container.appendChild(btn);
      });
    }

    function renderCards() {
      const container = document.getElementById('cardsContainer');
      container.innerHTML = '';
      const filtered = currentTab === 'all' ? cardsData : cardsData.filter(c => c.theme === currentTab);
      filtered.forEach(card => {
        const el = document.createElement('div');
        el.className = 'card glass';
        el.dataset.theme = card.theme;
        el.innerHTML = `
          <div class="card-title">${card.title}</div>
          <div class="card-desc">${card.description}</div>
          <div class="card-links">
            ${(card.links || []).map(link => `<a href="${link.url}" class="card-link" target="_blank">${link.label}</a>`).join('')}
          </div>
        `;
        el.onclick = () => { if (isAdminUnlocked) openEdit(card.id); };
        container.appendChild(el);
      });
    }

    function openEdit(id) {
      const card = cardsData.find(c => c.id === id);
      editingId = id;
      if (card) {
        document.getElementById('modalTitle').textContent = '編輯卡片';
        document.getElementById('editTheme').value = card.theme;
        document.getElementById('editTitle').value = card.title;
        document.getElementById('editDesc').value = card.description;
        document.getElementById('editLinks').value = (card.links || []).map(l => `${l.label} | ${l.url}`).join('\n');
        document.getElementById('deleteBtnModal').style.display = 'block';
      } else {
        document.getElementById('modalTitle').textContent = '新增卡片';
        document.getElementById('editForm').reset();
        document.getElementById('deleteBtnModal').style.display = 'none';
        editingId = null;
      }
      document.getElementById('editModal').classList.add('open');
    }

    // 密碼解鎖
    document.getElementById('adminUnlockBtn').onclick = () => {
      const pw = document.getElementById('adminPwInput').value;
      if (pw === ADMIN_PASSWORD) {
        isAdminUnlocked = true;
        document.getElementById('adminLock').style.display = 'none';
        document.getElementById('adminSection').style.display = 'block';
        document.getElementById('adminPwError').style.display = 'none';
      } else {
        document.getElementById('adminPwError').style.display = 'block';
      }
    };

    document.getElementById('adminPwInput').onkeypress = (e) => {
      if (e.key === 'Enter') document.getElementById('adminUnlockBtn').click();
    };

    document.getElementById('addBtn').onclick = () => openEdit(null);

    document.getElementById('saveBtnModal').onclick = () => {
      const theme = document.getElementById('editTheme').value;
      const title = document.getElementById('editTitle').value;
      const desc = document.getElementById('editDesc').value;
      const linksText = document.getElementById('editLinks').value;
      const links = linksText.split('\n').filter(l => l.trim()).map(l => {
        const [label, url] = l.split('|').map(s => s.trim());
        return { label, url };
      });

      if (editingId) {
        const card = cardsData.find(c => c.id === editingId);
        if (card) {
          card.theme = theme;
          card.title = title;
          card.description = desc;
          card.links = links;
        }
      } else {
        cardsData.push({
          id: Date.now(),
          theme,
          title,
          description: desc,
          links
        });
      }
      document.getElementById('editModal').classList.remove('open');
      renderCards();
    };

    document.getElementById('deleteBtnModal').onclick = () => {
      if (editingId && confirm('確定刪除此卡片？')) {
        cardsData = cardsData.filter(c => c.id !== editingId);
        document.getElementById('editModal').classList.remove('open');
        renderCards();
      }
    };

    document.getElementById('exportBtn').onclick = () => {
      const data = {
        version: 1,
        avatar: document.getElementById('profileAvatar').src,
        cardsData,
        tabOrder
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ot-workflow-backup.json';
      a.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById('importBtn').onclick = () => document.getElementById('importInput').click();

    document.getElementById('importInput').onchange = function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.avatar) document.getElementById('profileAvatar').src = data.avatar;
          if (data.cardsData) cardsData = data.cardsData;
          if (data.tabOrder) tabOrder = data.tabOrder;
          renderTabs();
          renderCards();
          alert('✅ 匯入成功！');
        } catch (err) {
          alert('❌ 匯入失敗');
        }
      };
      reader.readAsText(file);
    };

    document.getElementById('editModal').onclick = (e) => {
      if (e.target === document.getElementById('editModal')) {
        document.getElementById('editModal').classList.remove('open');
      }
    };

    loadData();
  </script>
</body>
</html>
